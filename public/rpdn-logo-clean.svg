<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Background circle -->
  <circle cx="150" cy="150" r="145" fill="#f5ede0" stroke="#e8dcc8" stroke-width="2"/>
  
  <!-- Left laurel wreath -->
  <g transform="translate(80, 100)">
    <path d="M 10 20 Q 5 10, 8 0 Q 10 8, 12 0 Q 15 10, 10 20" fill="#7a9b54" opacity="0.8"/>
    <path d="M 20 22 Q 15 10, 18 0 Q 20 10, 22 0 Q 25 12, 20 22" fill="#7a9b54" opacity="0.8"/>
    <path d="M 30 20 Q 25 8, 28 0 Q 30 8, 32 0 Q 35 10, 30 20" fill="#7a9b54" opacity="0.8"/>
    <path d="M 5 30 Q 2 18, 5 8 Q 8 18, 10 8 Q 12 20, 5 30" fill="#7a9b54" opacity="0.7"/>
    <path d="M 32 32 Q 30 20, 33 10 Q 35 20, 37 10 Q 38 22, 32 32" fill="#7a9b54" opacity="0.7"/>
  </g>
  
  <!-- Right laurel wreath -->
  <g transform="translate(210, 100) scale(-1, 1)">
    <path d="M 10 20 Q 5 10, 8 0 Q 10 8, 12 0 Q 15 10, 10 20" fill="#7a9b54" opacity="0.8"/>
    <path d="M 20 22 Q 15 10, 18 0 Q 20 10, 22 0 Q 25 12, 20 22" fill="#7a9b54" opacity="0.8"/>
    <path d="M 30 20 Q 25 8, 28 0 Q 30 8, 32 0 Q 35 10, 30 20" fill="#7a9b54" opacity="0.8"/>
    <path d="M 5 30 Q 2 18, 5 8 Q 8 18, 10 8 Q 12 20, 5 30" fill="#7a9b54" opacity="0.7"/>
    <path d="M 32 32 Q 30 20, 33 10 Q 35 20, 37 10 Q 38 22, 32 32" fill="#7a9b54" opacity="0.7"/>
  </g>
  
  <!-- Dove body -->
  <ellipse cx="150" cy="110" rx="18" ry="22" fill="#8b7355"/>
  
  <!-- Dove head -->
  <circle cx="150" cy="85" r="14" fill="#8b7355"/>
  
  <!-- Dove beak -->
  <path d="M 162 85 L 175 84 L 162 87 Z" fill="#a0826d"/>
  
  <!-- Dove eye -->
  <circle cx="157" cy="82" r="2" fill="#2a2a2a"/>
  
  <!-- Left wing -->
  <path d="M 140 105 Q 115 95, 110 85 Q 115 100, 135 115 Z" fill="#8b7355" opacity="0.9"/>
  <path d="M 135 110 Q 118 102, 112 92" stroke="#6b5344" stroke-width="0.8" fill="none" opacity="0.6"/>
  <path d="M 133 115 Q 116 108, 110 100" stroke="#6b5344" stroke-width="0.8" fill="none" opacity="0.6"/>
  
  <!-- Right wing -->
  <path d="M 160 105 Q 185 95, 190 85 Q 185 100, 165 115 Z" fill="#8b7355" opacity="0.9"/>
  <path d="M 165 110 Q 182 102, 188 92" stroke="#6b5344" stroke-width="0.8" fill="none" opacity="0.6"/>
  <path d="M 167 115 Q 184 108, 190 100" stroke="#6b5344" stroke-width="0.8" fill="none" opacity="0.6"/>
  
  <!-- Tail feathers -->
  <path d="M 145 128 Q 140 150, 138 170" stroke="#6b5344" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 150 130 Q 150 152, 150 172" stroke="#6b5344" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 155 128 Q 160 150, 162 170" stroke="#6b5344" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Olive branch in beak -->
  <path d="M 165 84 Q 180 80, 190 75" stroke="#7a9b54" stroke-width="1.5" fill="none"/>
  <circle cx="180" cy="79" r="1.5" fill="#7a9b54"/>
  <circle cx="185" cy="77" r="1.5" fill="#7a9b54"/>
  <circle cx="190" cy="75" r="1.5" fill="#7a9b54"/>
</svg>